# SwiftLint Configuration for KingGame
# A rule-based utility for enforcing Swift style and conventions

# https://github.com/realm/SwiftLint

# Rules that are enabled by default
opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - fatal_error_message
  - first_where
  - joined_default_parameter
  - legacy_random
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - overridden_super_call
  - prohibited_super_call
  - redundant_nil_coalescing
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

# Rules to exclude
excluded:
  - Carthage
  - Pods
  - .build
  - DerivedData
  - KingGameTests

# Rule configurations
line_length:
  warning: 150
  error: 200
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true

file_length:
  warning: 500
  error: 600
  ignore_comment_only_lines: true

type_body_length:
  warning: 400
  error: 500

function_body_length:
  warning: 100
  error: 150

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level:
    warning: 2
    error: 3
  function_level:
    warning: 5
    error: 7

large_tuple:
  warning: 3
  error: 4

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 40
    error: 50
  allowed_symbols:
    - _
  validates_start_with_lowercase: error
  excludes:
    - id
    - of
    - at
    - to
    - up
    - in
    - on
    - x
    - y
    - z
    - w
    - i
    - j
    - k

force_cast: warning
force_try: warning
force_unwrapping: warning

discouraged_directive:
  severity: warning
  directive: todo
  message: "TODOs should be resolved before committing"

discouraged_objective_c_selector: warning
discouraged_optional_boolean: warning
discouraged_optional_collection: warning

explicit_self:
  required:
    - assert
    - assertionFailure
    - debugPrint
    - dump
    - fatalError
    - print
    - precondition
    - preconditionFailure
    - unimplemented

trailing_comma:
  mandatory_comma: true

vertical_whitespace:
  max_empty_lines: 2

opening_brace:
  allow_multiline_func: true

custom_rules:
  # Prefer `isEmpty` check over `count == 0`
  array_count_zero:
    name: "Array Count Zero"
    regex: '\b\w+\.(count|length)\s*(==|!=)\s*0\b'
    message: "Use isEmpty property instead of comparing count to 0"
    severity: warning

  # Prefer `??` over ternary for nil coalescing
  nil_coalescing_ternary:
    name: "Nil Coalescing Ternary"
    regex: '\w+\s*==\s*nil\s*\?\s*\w+\s*:\s*\w+'
    message: "Use nil coalescing operator (??) instead of ternary"
    severity: warning

  # No print statements in production code
  print_statement:
    name: "Print Statement"
    regex: '\bprint\s*\('
    message: "Use proper logging instead of print statements"
    severity: warning
    excluded: ".*Tests\\.swift"

  # Prefer guard for early returns
  guard_let:
    name: "Guard Let"
    regex: 'if\s+let\s+\w+\s*=\s*\w+\s*\{'
    message: "Consider using guard let for early returns"
    severity: warning

  # No magic numbers
  magic_number:
    name: "Magic Number"
    regex: '[:=]\s*\b[0-9]{2,}\b'
    message: "Use named constants for magic numbers"
    severity: warning
    excluded: ".*Tests\\.swift|GameConstants\\.swift"
